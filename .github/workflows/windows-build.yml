name: Windows Build MSVC
on: [push, pull_request]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          # Non chiamiamo vcpkg a mano, lasciamo che CMake usi il manifest
          cmake .. `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_BITCOIN_TESTS=OFF `
            -DBUILD_BITCOIN_BENCH=OFF `
            -DWITH_WIDGETS=ON

      - name: Build Core
        run: |
          cd build
          cmake --build . --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: newbitcoin-windows-msvc
          path: |
            build/src/Release/newbitcoind.exe
            build/src/qt/Release/newbitcoin-qt.exe
            build/src/Release/newbitcoin-cli.exe
